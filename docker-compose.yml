
services:
  db:
    image: postgres:16.1
    container_name: morning-box-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - morning-box_db_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: morning-box-app
    depends_on: 
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports: 
      - "3000:3000"
    command: >
      sh -c "sleep 5 &&
             npx prisma migrate deploy && 
             npx prisma db seed"
#             && npm run start" 
volumes:
    morning-box_db_data: